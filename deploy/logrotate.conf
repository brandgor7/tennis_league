# Logrotate configuration for the tennis-scores app.
#
# Install:
#   sudo cp deploy/logrotate.conf /etc/logrotate.d/tennis-scores
#
# Adjust the log path below to match LOG_DIR in your .env.
# The WatchedFileHandler in Django detects the inode change after rotation
# and reopens the new file automatically — no reload or postrotate signal needed.

/var/log/tennis-scores/*.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    create 0640 www-data www-data
}
